<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Call</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .btn {
      border: 1px solid #888;
      background: #eee;
      cursor: pointer;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 6px;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .status {
      font-size: 0.9rem;
      color: #555;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="btn-call" class="btn" type="button">Call</button>
    <button id="btn-end" class="btn" type="button" disabled>End Call</button>
    <div id="call-status" class="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"></script>

  <script>
    let vapiAssistant = null;
    let callActive = false;

    const btnCall = document.getElementById("btn-call");
    const btnEnd = document.getElementById("btn-end");
    const statusEl = document.getElementById("call-status");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function setButtons(calling) {
      btnCall.disabled = calling;
      btnEnd.disabled = !calling;
    }

    function hideVapiElements() {
      document.querySelectorAll('[id*="vapi"], [class*="vapi"]').forEach(function(el) {
        el.style.display = "none";
      });
    }

    function startCall() {
      if (callActive) return;
      callActive = true;
      setButtons(true);
      setStatus("Connecting");

      if (!window.vapiSDK || typeof window.vapiSDK.run !== "function") {
        setStatus("SDK not loaded");
        callActive = false;
        setButtons(false);
        return;
      }

      // run() creates the assistant instance and mounts a button
      vapiAssistant = window.vapiSDK.run({
        apiKey: "21e4f330-20a7-4991-af8b-469904da82b1",
        assistant: "48120a37-f96a-47fb-af38-8f53d19739ce",
        config: {
          position: "bottom-right",
        },
      });

      // Hide any Vapi mounted elements
      hideVapiElements();
      var hideTimer = setInterval(function() {
        hideVapiElements();
        if (!callActive) clearInterval(hideTimer);
      }, 100);

      // Start the call via the assistant instance
      if (vapiAssistant && typeof vapiAssistant.start === "function") {
        vapiAssistant.start("48120a37-f96a-47fb-af38-8f53d19739ce");
      }

      // Listen for call-end events to reset state
      if (vapiAssistant && typeof vapiAssistant.on === "function") {
        vapiAssistant.on("call-end", function() {
          callActive = false;
          setButtons(false);
          setStatus("Call ended");
          vapiAssistant = null;
        });
        vapiAssistant.on("call-start", function() {
          setStatus("");
        });
      }

      // Fallback: clear connecting status after a few seconds
      setTimeout(function() {
        if (callActive) setStatus("");
      }, 5000);
    }

    function endCall() {
      if (!callActive) return;
      callActive = false;
      setButtons(false);
      setStatus("Call ended");

      if (vapiAssistant && typeof vapiAssistant.stop === "function") {
        vapiAssistant.stop();
      }

      vapiAssistant = null;
    }

    window.addEventListener("load", function() {
      btnCall.addEventListener("click", startCall);
      btnEnd.addEventListener("click", endCall);
    });
  </script>
</body>
</html>
