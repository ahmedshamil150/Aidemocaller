<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Call</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .btn {
      border: 1px solid #888;
      background: #eee;
      cursor: pointer;
      padding: 10px 24px;
      font-size: 1rem;
      border-radius: 6px;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .status {
      font-size: 0.9rem;
      color: #555;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="btn-call" class="btn" type="button">Call</button>
    <button id="btn-end" class="btn" type="button" disabled>End Call</button>
    <div id="call-status" class="status"></div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
  ></script>

  <script>
    let isCallActive = false;
    let isCallEnded = false;
    let connectTimer = null;

    const btnCall = document.getElementById("btn-call");
    const btnEnd = document.getElementById("btn-end");
    const statusEl = document.getElementById("call-status");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function setButtons(calling) {
      btnCall.disabled = calling;
      btnEnd.disabled = !calling;
    }

    function startCall() {
      if (isCallActive) return;
      isCallActive = true;
      isCallEnded = false;
      setButtons(true);
      setStatus("Connecting");

      // Clear connecting after 4s (call should be active by then)
      connectTimer = setTimeout(() => {
        if (isCallActive && !isCallEnded) {
          setStatus("");
        }
      }, 4000);

      if (window.vapiSDK && typeof window.vapiSDK.run === "function") {
        window.vapiSDK.run({
          apiKey: "21e4f330-20a7-4991-af8b-469904da82b1",
          assistant: "48120a37-f96a-47fb-af38-8f53d19739ce",
          config: {
            position: "bottom-right",
            __internal: {
              disableDefaultMicButton: true,
              disableCallButton: true,
              disableEndCallButton: true,
            },
          },
        });

        // Poll for call end by checking if the SDK exposes a state
        // or just rely on the user pressing End Call
      }
    }

    function endCall() {
      if (!isCallActive) return;
      isCallActive = false;
      isCallEnded = true;
      setButtons(false);
      setStatus("Call ended");

      if (connectTimer) {
        clearTimeout(connectTimer);
        connectTimer = null;
      }

      try {
        // Try to stop via vapiSDK
        if (window.vapiSDK && typeof window.vapiSDK.stop === "function") {
          window.vapiSDK.stop();
        }
        // Try to find the Vapi assistant instance and stop it
        if (window.__vapi_assistant && typeof window.__vapi_assistant.stop === "function") {
          window.__vapi_assistant.stop();
        }
      } catch(e) {
        // ignore
      }
    }

    window.addEventListener("load", () => {
      btnCall.addEventListener("click", startCall);
      btnEnd.addEventListener("click", endCall);

      // Hide default Vapi floating button
      const observer = new MutationObserver(() => {
        const vapiBtn = document.querySelector('[id*="vapi"], [class*="vapi"]');
        if (vapiBtn) {
          vapiBtn.style.display = "none";
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    });
  </script>
</body>
</html>
